# Social Media Bot — Example Configuration
# Copy to config.yaml and fill in your values.
# Secrets (API keys) must be set as environment variables, not here.

persona:
  # Bot persona name. Leave blank to auto-generate.
  name: ""
  # Platform handle/username
  handle: ""

posting:
  # Minimum minutes between posts
  min_interval_minutes: 90
  # Maximum minutes between posts
  max_interval_minutes: 300
  # Target posts per day (scheduler adjusts intervals to hit this range)
  posts_per_day_min: 3
  posts_per_day_max: 10
  # Additional random jitter in seconds added before each post (human-like delay)
  jitter_seconds_min: 5
  jitter_seconds_max: 45

content:
  tone:
    - sarcastic
    - dry
    - blunt
    - irreverent

  topics:
    - AI developments and hype
    - twitch and gaming drama
    - cultural commentary on media
    - politics and policy
    - mens experiences and dating
    - extremes in social debates
    - crypto culture and memes
    - viral social media moments
    - influencer and creator drama
    - pop culture and meme trends

  style:
    max_length: 280
    capitalization: minimal    # minimal | normal | none
    punctuation: minimal       # minimal | normal
    emoji_probability: 0.4     # 0.0–1.0
    gif_probability: 0.15      # 0.0–1.0

  # Worldview lean — fed into prompt assembly, never posted directly
  lean: "edgy conservative grounded in reality and statistics, implied through sarcasm"

  # Hard rules the generator must follow
  guidelines:
    - never reference the person behind the account
    - never be explicitly political or partisan
    - never use shock-bait or rage-farming tactics
    - lean should be inferred through humor and framing only
    - avoid slurs, hate speech, or punching down
    - keep posts brief — one idea per post
    - no threads, no quote-tweet chains

  # Trending context: search for what's hot before generating
  trending:
    enabled: false
    # "lm" = ask the LM what's trending (works in dry-run, no auth needed)
    # "platform" = search the platform API (requires auth)
    # "both" = try both and combine context
    source: lm
    max_results: 10
    # Max seconds to wait for trending research (LM research can be slow)
    timeout_seconds: 60

  # Prompt strategy: steer diversity and engagement without hard-coded templates
  prompting:
    variation_modes:
      - observation
      - prediction
      - contrast
      - callout
      - deadpan
      - receipt
      - one-liner
      - question-like hook without asking a question
    discouraged_patterns:
      - generic summary ending
    engagement_goals:
      - lead with a concrete observation
      - make the reader feel they noticed something true
      - prefer specific nouns over abstractions
      - invite internal agreement or disagreement without explicit CTA
    engagement_anti_patterns:
      - do not sound like engagement bait
      - avoid generic hashtags unless truly central
      - avoid sounding like a take-generator
      - avoid explaining the joke
    affinity_mode: lean_charitable_people   # off | lean_charitable_people
    affinity_instructions:
      - if a person appears broadly aligned with the configured worldview, avoid cheap negative swipes
      - default to neutral or charitable framing unless there is a clear factual reason to criticize
      - do not praise blindly
    recent_posts_window: 5

# Which backend to use for content generation: "codex" or "vscode-lm"
# - codex:     calls the Codex CLI (requires OpenAI API key)
# - vscode-lm: calls the local VS Code LM proxy extension (uses Copilot subscription)
generator_backend: codex

codex:
  # Path to Codex CLI binary. Leave blank to auto-detect on PATH.
  cli_path: ""
  # Model to request
  model: ""
  # Max seconds to wait for content generation
  timeout_seconds: 30

vscode_lm:
  # Host/port for the VS Code LM proxy extension HTTP server
  host: "127.0.0.1"
  port: 19280
  # Max seconds to wait for content generation
  timeout_seconds: 60

# Brave Search API — provides real news/web results for trending context (RAG)
brave_search:
  # Environment variable holding your Brave Search API key (get one at brave.com/search/api)
  api_key_env: BRAVE_API_KEY
  # Timeout for Brave Search API requests
  timeout_seconds: 15
  # Freshness filter: pd=past day, pw=past week, pm=past month
  freshness: pd
  # Number of results to fetch per topic
  count: 10

# Giphy integration — search for GIFs when the LM includes a [gif: ...] tag
giphy:
  # Environment variable holding your Giphy API key (get one at developers.giphy.com)
  api_key_env: GIPHY_API_KEY
  # Content rating filter: g | pg | pg-13 | r
  rating: pg-13
  # Timeout for Giphy API requests
  timeout_seconds: 10

engagement:
  # Persisted state to avoid duplicate comment replies across restarts
  state_path: .bot_state/engagement_state.json
  replies:
    enabled: false
    min_replies_per_post: 5
    max_replies_per_post: 8
    window_minutes: 120
    poll_interval_seconds_min: 30
    poll_interval_seconds_max: 90
    reply_delay_seconds_min: 8
    reply_delay_seconds_max: 40
    allow_neutral_as_positive: true
    max_replies_per_user_per_post: 1
    positive_emojis: ["😅", "🤣"]
    negative_emojis: ["🥴", "🤡"]
    positive_emoji_probability: 0.35
    negative_emoji_probability: 0.5
    skip_if_contains_links: true
    skip_if_author_is_self: true

platform: twitter

platform_config:
  twitter:
    # All credentials come from environment variables:
    #   TWITTER_API_KEY
    #   TWITTER_API_SECRET
    #   TWITTER_ACCESS_TOKEN
    #   TWITTER_ACCESS_SECRET
    api_key_env: TWITTER_API_KEY
    api_secret_env: TWITTER_API_SECRET
    access_token_env: TWITTER_ACCESS_TOKEN
    access_secret_env: TWITTER_ACCESS_SECRET

logging:
  level: INFO    # DEBUG | INFO | WARNING | ERROR
